<!DOCTYPE html>
<html lang="fr" id="main-html">
<head>
  <meta charset="UTF-8">
  <title>SOG Zabana 3.6</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: { primary: '#2563EB', secondary: '#10B981', accent: '#F59E0B' },
          fontFamily: { sans: ['Inter', 'Cairo', 'sans-serif'] }
        }
      }
    }
  </script>

  <style>
    body { padding-bottom: 100px; transition: background-color 0.2s, color 0.2s; }
    .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border-b: 1px solid rgba(226, 232, 240, 0.8); }
    .dark .glass { background: rgba(30, 41, 59, 0.85); backdrop-filter: blur(12px); border-b: 1px solid rgba(51, 65, 85, 0.8); }
    .nav-active { color: #2563EB; transform: scale(1.05); font-weight: 600; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 antialiased min-h-screen w-full max-w-2xl mx-auto shadow-xl relative">

  <header class="sticky top-0 z-50 glass px-4 py-3.5 flex items-center justify-between">
    <div class="flex items-center gap-2">
      <div class="w-9 h-9 bg-primary rounded-xl flex items-center justify-center text-white font-bold text-xl shadow-md">S</div>
      <span class="font-bold text-xl tracking-tight bg-gradient-to-r from-primary to-blue-500 bg-clip-text text-transparent">SOG Zabana</span>
    </div>
    <div class="flex items-center gap-2">
      <button onclick="toggleLanguage()" class="text-xs font-bold px-2.5 py-1.5 rounded-lg bg-slate-200 dark:bg-slate-800 hover:bg-primary hover:text-white transition" id="lang-btn">العربية</button>
      <button onclick="toggleDarkMode()" class="p-2 text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-800 rounded-xl transition">
        <i class="fa-solid fa-moon text-lg dark:hidden"></i>
        <i class="fa-solid fa-sun text-lg hidden dark:inline"></i>
      </button>
    </div>
  </header>

  <section id="scr-home" class="screen-panel p-4 space-y-4">
    <div class="relative" onclick="switchTab('search')">
      <input type="text" readonly id="dict-search-placeholder" class="w-full bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl pl-10 pr-4 py-3.5 text-sm cursor-pointer">
      <i class="fa-solid fa-wand-magic-sparkles absolute left-3 top-4 text-primary"></i>
    </div>
    <div id="feed-container" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      <div class="p-4 text-center text-slate-400 col-span-full"><i class="fa-solid fa-spinner animate-spin mr-2"></i>Chargement...</div>
    </div>
  </section>

  <section id="scr-search" class="screen-panel p-4 space-y-4 hidden">
    <h2 class="text-xl font-bold" id="dict-search-title">Recherche</h2>
    <input type="text" id="search-input" onkeyup="executeSearch()" class="w-full bg-white dark:bg-slate-900 border dark:border-slate-800 rounded-xl px-4 py-3 text-sm focus:outline-none">
    <div id="search-results" class="grid grid-cols-1 gap-3 pt-2"></div>
  </section>

  <section id="scr-publish" class="screen-panel p-4 space-y-4 hidden">
    <div id="publish-blocked" class="bg-amber-50 dark:bg-amber-950/20 border border-amber-200 dark:border-amber-900 p-6 rounded-2xl text-center space-y-3">
      <i class="fa-solid fa-user-lock text-4xl text-amber-500"></i>
      <h3 class="font-bold text-lg" id="txt-block-title">Connexion Requise</h3>
      <p class="text-sm text-slate-600 dark:text-slate-400" id="txt-block-sub">Les simples visiteurs anonymes ne peuvent pas vendre. Veuillez créer un compte ou vous connecter.</p>
      <button onclick="switchTab('profile')" class="bg-primary text-white text-sm px-5 py-2.5 rounded-xl font-bold shadow">S'enregistrer / Se connecter</button>
    </div>

    <div id="publish-allowed" class="hidden space-y-4">
      <h2 class="text-xl font-bold" id="dict-pub-title">Déposer une annonce</h2>
      <form id="form-annonce" onsubmit="soumettreAnnonce(event)" class="space-y-4">
        <input type="file" id="p-file" accept="image/*" onchange="previewImageFile()" class="text-sm text-slate-500">
        <img id="img-preview" src="" class="w-12 h-12 object-cover rounded-lg hidden border">
        <input type="text" id="p-titre" required placeholder="Titre" class="w-full bg-white dark:bg-slate-900 border dark:border-slate-800 rounded-xl px-4 py-3 text-sm">
        <input type="number" id="p-prix" required placeholder="Prix (DA)" class="w-full bg-white dark:bg-slate-900 border dark:border-slate-800 rounded-xl px-4 py-3 text-sm">
        <select id="p-cat" class="w-full bg-white dark:bg-slate-900 border dark:border-slate-800 rounded-xl px-4 py-3 text-sm">
          <option value="Auto">🚗 Automobile</option>
          <option value="Immobilier">🏠 Immobilier</option>
          <option value="Tech">📱 Technologie</option>
        </select>
        <textarea id="p-desc" rows="3" placeholder="Description..." class="w-full bg-white dark:bg-slate-900 border dark:border-slate-800 rounded-xl px-4 py-3 text-sm"></textarea>
        <button type="submit" id="btn-submit" class="w-full bg-secondary text-white py-3.5 rounded-xl font-bold shadow">Publier l'Annonce</button>
      </form>
    </div>
  </section>

  <section id="scr-chat" class="screen-panel flex flex-col h-[calc(100vh-150px)] hidden">
    <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-3 bg-slate-100 dark:bg-slate-900/40 rounded-2xl no-scrollbar"></div>
    <div class="p-2 mt-2 border dark:border-slate-800 flex gap-2 items-center bg-white dark:bg-slate-900 rounded-xl">
      <input type="text" id="chat-input" placeholder="Message public..." class="flex-1 bg-slate-50 dark:bg-slate-800 text-sm rounded-lg px-4 py-2.5 focus:outline-none">
      <button onclick="postChatMessage()" class="w-10 h-10 bg-primary text-white rounded-lg flex items-center justify-center"><i class="fa-solid fa-paper-plane"></i></button>
    </div>
  </section>

  <section id="scr-profile" class="screen-panel p-4 space-y-4 hidden">
    
    <div id="profile-unauth" class="space-y-4">
      
      <div class="flex border-b dark:border-slate-800">
        <button onclick="toggleAuthMode('login')" id="btn-tab-login" class="flex-1 py-2 text-center text-sm font-bold border-b-2 border-primary text-primary">Connexion</button>
        <button onclick="toggleAuthMode('register')" id="btn-tab-register" class="flex-1 py-2 text-center text-sm font-bold border-b-2 border-transparent text-slate-400">Inscription (Loi 18-05)</button>
      </div>

      <form id="form-login" onsubmit="connexionCompte(event)" class="space-y-3">
        <input type="email" id="log-email" required placeholder="Adresse E-mail" class="w-full bg-white dark:bg-slate-900 border dark:border-slate-800 rounded-xl px-4 py-2.5 text-sm">
        <input type="password" id="log-mdp" required placeholder="Mot de passe" class="w-full bg-white dark:bg-slate-900 border dark:border-slate-800 rounded-xl px-4 py-2.5 text-sm">
        <button type="submit" class="w-full bg-primary text-white py-3 rounded-xl font-bold shadow">Se connecter</button>
      </form>

      <form id="form-register" onsubmit="enregistrerCompte(event)" class="space-y-3 hidden">
        <input type="text" id="reg-name" required placeholder="Nom / Raison Sociale" class="w-full bg-white dark:bg-slate-900 border dark:border-slate-800 rounded-xl px-4 py-2.5 text-sm">
        <input type="email" id="reg-email" required placeholder="Adresse E-mail" class="w-full bg-white dark:bg-slate-900 border dark:border-slate-800 rounded-xl px-4 py-2.5 text-sm">
        <input type="tel" id="reg-tel" required placeholder="N° de Téléphone" class="w-full bg-white dark:bg-slate-900 border dark:border-slate-800 rounded-xl px-4 py-2.5 text-sm">
        <input type="text" id="reg-wilaya" required placeholder="Wilaya" class="w-full bg-white dark:bg-slate-900 border dark:border-slate-800 rounded-xl px-4 py-2.5 text-sm">
        <input type="password" id="reg-mdp" required placeholder="Créer un mot de passe" class="w-full bg-white dark:bg-slate-900 border dark:border-slate-800 rounded-xl px-4 py-2.5 text-sm">
        
        <select id="reg-type" onchange="toggleCnrcField()" class="w-full bg-white dark:bg-slate-900 border dark:border-slate-800 rounded-xl px-4 py-2.5 text-sm">
          <option value="Particulier">Vendeur Particulier</option>
          <option value="Professionnel">Vendeur Professionnel (Boutique CNRC)</option>
        </select>
        <div id="cnrc-box" class="hidden">
          <input type="text" id="reg-cnrc" placeholder="N° Registre du Commerce (CNRC)" class="w-full bg-amber-50/50 dark:bg-slate-800 border rounded-xl px-4 py-2.5 text-sm">
        </div>
        <button type="submit" class="w-full bg-emerald-500 text-white py-3 rounded-xl font-bold shadow" id="dict-reg-btn">Créer le compte</button>
      </form>
    </div>

    <div id="profile-auth" class="hidden space-y-4">
      <div class="p-4 bg-emerald-50 dark:bg-emerald-950/20 border border-emerald-200 dark:border-emerald-800 rounded-2xl flex items-center gap-3">
        <div class="w-12 h-12 bg-secondary text-white rounded-xl flex items-center justify-center font-bold text-xl"><i class="fa-solid fa-user-check"></i></div>
        <div>
          <h4 class="font-bold text-sm" id="user-display-name">---</h4>
          <span class="text-[10px] bg-secondary text-white px-2 rounded" id="user-display-type">---</span>
        </div>
      </div>
      <button onclick="logout()" class="w-full bg-rose-500 text-white py-2.5 rounded-xl text-xs font-bold shadow">Déconnexion / خروج</button>
    </div>
  </section>

  <nav class="fixed bottom-4 left-1/2 -translate-x-1/2 w-[92%] max-w-xl glass h-16 rounded-2xl shadow-xl flex items-center justify-around px-2 z-50">
    <button onclick="switchTab('home')" id="nav-home" class="flex flex-col items-center text-slate-400 nav-active"><i class="fa-solid fa-house text-lg"></i><span class="text-[9px] mt-0.5" id="lbl-nav-home">Accueil</span></button>
    <button onclick="switchTab('search')" id="nav-search" class="flex flex-col items-center text-slate-400"><i class="fa-solid fa-magnifying-glass text-lg"></i><span class="text-[9px] mt-0.5" id="lbl-nav-search">Chercher</span></button>
    <button onclick="switchTab('publish')" id="nav-publish" class="w-12 h-12 bg-primary text-white rounded-xl flex items-center justify-center shadow-lg -translate-y-3"><i class="fa-solid fa-plus text-xl"></i></button>
    <button onclick="switchTab('chat')" id="nav-chat" class="flex flex-col items-center text-slate-400"><i class="fa-solid fa-comments text-lg"></i><span class="text-[9px] mt-0.5" id="lbl-nav-chat">Chat</span></button>
    <button onclick="switchTab('profile')" id="nav-profile" class="flex flex-col items-center text-slate-400"><i class="fa-solid fa-user text-lg"></i><span class="text-[9px] mt-0.5" id="lbl-nav-profile">Compte</span></button>
  </nav>

  <script>
    let globalAnnonces = [];
    let currentLang = localStorage.getItem('sog_lang') || 'fr';
    let userSession = JSON.parse(localStorage.getItem('sog_user')) || null;
    let base64ImageString = "";

    const dictionary = {
      fr: {
        search_ph: "Rechercher sur Zabana...", search_title: "Moteur de recherche 🔎",
        pub_title: "Créer une nouvelle offre", pub_btn: "🚀 Mettre en ligne l'annonce",
        block_title: "Identification Obligatoire", block_sub: "Les simples visiteurs anonymes ne peuvent pas vendre. Veuillez créer un compte ou vous connecter via l'onglet Compte.",
        nav_home: "Accueil", nav_search: "Chercher", nav_chat: "Discussion", nav_profile: "Mon Espace"
      },
      ar: {
        search_ph: "البحث في سوق زبانة...", search_title: "محرك البحث 🔎",
        pub_title: "نشر إعلان جديد", pub_btn: "🚀 نشر الإعلان في السوق",
        block_title: "خاصية البائعين فقط", block_sub: "لا يمكن للزوار العاديين نشر إعلانات بدون تسجيل حساب رسمي أولاً في خانة 'حسابي'.",
        nav_home: "الرئيسية", nav_search: "بحث", nav_chat: "الدردشة", nav_profile: "حسابي"
      }
    };

    window.onload = function() {
      applyTheme(localStorage.getItem('theme') || 'light');
      applyLanguage(currentLang);
      checkUserAuth();
      loadAnnoncesFromSheets();
      loadChatMessages();
    };

    function applyLanguage(lang) {
      currentLang = lang; localStorage.setItem('sog_lang', lang);
      const dict = dictionary[lang];
      document.getElementById('main-html').setAttribute('dir', lang === 'ar' ? 'ar' : 'ltr');
      document.getElementById('lang-btn').innerText = lang === 'ar' ? "Français" : "العربية";

      document.getElementById('dict-search-placeholder').placeholder = dict.search_ph;
      document.getElementById('dict-search-title').innerText = dict.search_title;
      document.getElementById('dict-pub-title').innerText = dict.pub_title;
      document.getElementById('btn-submit').innerText = dict.pub_btn;
      document.getElementById('txt-block-title').innerText = dict.block_title;
      document.getElementById('txt-block-sub').innerText = dict.block_sub;
      
      document.getElementById('lbl-nav-home').innerText = dict.nav_home;
      document.getElementById('lbl-nav-search').innerText = dict.nav_search;
      document.getElementById('lbl-nav-chat').innerText = dict.nav_chat;
      document.getElementById('lbl-nav-profile').innerText = dict.nav_profile;
    }

    function toggleLanguage() { applyLanguage(currentLang === 'fr' ? 'ar' : 'fr'); }
    function toggleDarkMode() { applyTheme(document.documentElement.classList.contains('dark') ? 'light' : 'dark'); }
    function applyTheme(t) { t === 'dark' ? document.documentElement.classList.add('dark') : document.documentElement.classList.remove('dark'); localStorage.setItem('theme', t); }
    function toggleCnrcField() { document.getElementById('cnrc-box').classList.toggle('hidden', document.getElementById('reg-type').value !== 'Professionnel'); }

    function toggleAuthMode(mode) {
      const isLogin = mode === 'login';
      document.getElementById('form-login').classList.toggle('hidden', !isLogin);
      document.getElementById('form-register').classList.toggle('hidden', isLogin);
      
      document.getElementById('btn-tab-login').className = isLogin ? "flex-1 py-2 text-center text-sm font-bold border-b-2 border-primary text-primary" : "flex-1 py-2 text-center text-sm font-bold border-b-2 border-transparent text-slate-400";
      document.getElementById('btn-tab-register').className = !isLogin ? "flex-1 py-2 text-center text-sm font-bold border-b-2 border-primary text-primary" : "flex-1 py-2 text-center text-sm font-bold border-b-2 border-transparent text-slate-400";
    }

    function switchTab(target) {
      document.querySelectorAll('.screen-panel').forEach(el => el.classList.add('hidden'));
      document.getElementById('scr-' + target).classList.remove('hidden');
      document.querySelectorAll('nav button').forEach(el => el.classList.remove('text-primary', 'nav-active'));
      if(target !== 'publish') document.getElementById('nav-' + target).classList.add('nav-active', 'text-primary');
    }

    function previewImageFile() {
      const file = document.getElementById('p-file').files[0];
      const preview = document.getElementById('img-preview');
      if (!file) return;
      const reader = new FileReader();
      reader.onloadend = function() { base64ImageString = reader.result; preview.src = reader.result; preview.classList.remove('hidden'); };
      reader.readAsDataURL(file);
    }

    function loadAnnoncesFromSheets() {
      google.script.run.withSuccessHandler(function(data) {
        globalAnnonces = data || [];
        renderFeed(globalAnnonces);
      }).getAnnonces();
    }

    function renderFeed(items) {
      const container = document.getElementById('feed-container');
      if(!items || items.length === 0) {
        container.innerHTML = `<p class="text-center text-xs py-8 text-slate-400 col-span-full">Aucun produit disponible.</p>`;
        return;
      }
      container.innerHTML = items.map(item => {
        var cleanTel = item.TelVendeur ? item.TelVendeur.trim() : "0550000000";
        return `
          <div class="bg-white dark:bg-slate-900 rounded-2xl overflow-hidden border border-slate-200 dark:border-slate-800 shadow-sm flex flex-col justify-between">
            <div>
              <img src="${item.Photo}" class="w-full h-44 object-cover bg-slate-100 dark:bg-slate-950" onerror="this.src='https://images.unsplash.com/photo-1555696958-c5049b866f6f?w=500'">
              <div class="p-3.5 space-y-1">
                <div class="flex justify-between items-center">
                  <span class="text-[9px] bg-blue-100 dark:bg-blue-950 text-primary dark:text-blue-300 font-bold px-2 py-0.5 rounded">${item.Categorie}</span>
                  <span class="text-xs font-bold text-emerald-500">${item.Prix} DA</span>
                </div>
                <h3 class="font-bold text-sm text-slate-900 dark:text-slate-100">${item.Titre}</h3>
                <p class="text-xs text-slate-500 dark:text-slate-400 line-clamp-2">${item.Description}</p>
                <div class="text-[10px] text-slate-400 pt-1"><span>👤 Vendeur: ${item.Localisation}</span></div>
              </div>
            </div>
            <div class="p-3 bg-slate-50 dark:bg-slate-900/60 border-t dark:border-slate-800 grid grid-cols-2 gap-2">
              <a href="tel:${cleanTel}" class="bg-primary text-white rounded-lg py-2 text-center text-xs font-bold flex items-center justify-center gap-1"><i class="fa-solid fa-phone"></i> Appeler</a>
              <a href="https://wa.me/213${cleanTel.replace(/^0/, "")}" target="_blank" class="bg-emerald-500 text-white rounded-lg py-2 text-center text-xs font-bold flex items-center justify-center gap-1"><i class="fa-brands fa-whatsapp"></i> WhatsApp</a>
            </div>
          </div>
        `;
      }).join('');
    }

    function soumettreAnnonce(e) {
      e.preventDefault();
      if(!userSession) return;
      const btn = document.getElementById('btn-submit');
      btn.disabled = true; btn.innerText = "...Publication...";

      google.script.run.withSuccessHandler(function(res) {
         alert(currentLang === 'fr' ? res.message_fr : res.message_ar);
         document.getElementById('form-annonce').reset();
         document.getElementById('img-preview').classList.add('hidden');
         base64ImageString = ""; btn.disabled = false;
         loadAnnoncesFromSheets(); switchTab('home');
      }).ajouterAnnonce(
        document.getElementById('p-titre').value, document.getElementById('p-desc').value,
        document.getElementById('p-prix').value, document.getElementById('p-cat').value,
        userSession.name, base64ImageString
      );
    }

    function checkUserAuth() {
      const blockPanel = document.getElementById('publish-blocked');
      const formPanel = document.getElementById('publish-allowed');
      if(userSession) {
        document.getElementById('profile-unauth').classList.add('hidden');
        document.getElementById('profile-auth').classList.remove('hidden');
        document.getElementById('user-display-name').innerText = userSession.name;
        document.getElementById('user-display-type').innerText = userSession.type;
        blockPanel.classList.add('hidden'); formPanel.classList.remove('hidden');
      } else {
        document.getElementById('profile-unauth').classList.remove('hidden');
        document.getElementById('profile-auth').classList.add('hidden');
        blockPanel.classList.remove('hidden'); formPanel.classList.add('hidden');
      }
    }

    function enregistrerCompte(e) {
      e.preventDefault();
      google.script.run.withSuccessHandler(function(res) {
        if(res.status === "success") {
          userSession = res;
          localStorage.setItem('sog_user', JSON.stringify(res));
          checkUserAuth();
        } else {
          alert(res.message_fr);
        }
      }).creerCompte(
        document.getElementById('reg-name').value, document.getElementById('reg-email').value,
        document.getElementById('reg-tel').value, document.getElementById('reg-wilaya').value,
        document.getElementById('reg-type').value, document.getElementById('reg-cnrc').value || "N/A",
        document.getElementById('reg-mdp').value
      );
    }

    function connexionCompte(e) {
      e.preventDefault();
      google.script.run.withSuccessHandler(function(res) {
        if(res.status === "success") {
          userSession = res;
          localStorage.setItem('sog_user', JSON.stringify(res));
          checkUserAuth();
          switchTab('home');
        } else {
          alert(currentLang === 'fr' ? res.message_fr : res.message_ar);
        }
      }).connecterCompte(document.getElementById('log-email').value, document.getElementById('log-mdp').value);
    }

    function logout() { localStorage.removeItem('sog_user'); userSession = null; checkUserAuth(); }

    function executeSearch() {
      let query = document.getElementById('search-input').value.toLowerCase();
      let results = globalAnnonces.filter(a => a.Titre.toLowerCase().includes(query) || a.Description.toLowerCase().includes(query));
      document.getElementById('search-results').innerHTML = results.map(item => `
        <div class="flex bg-white dark:bg-slate-900 p-2 border dark:border-slate-800 rounded-xl gap-3 items-center text-xs">
          <img src="${item.Photo}" class="w-12 h-12 object-cover rounded-lg">
          <div><h4 class="font-bold">${item.Titre}</h4><p class="text-emerald-500 font-bold">${item.Prix} DA</p></div>
        </div>
      `).join('');
    }

    function loadChatMessages() {
      google.script.run.withSuccessHandler(function(msgs) {
        document.getElementById('chat-messages').innerHTML = msgs.map(m => `
          <div class="flex flex-col ${m.sender === 'Moi' ? 'items-end' : 'items-start'}">
            <div class="p-2.5 rounded-2xl text-xs max-w-[80%] ${m.sender === 'Moi' ? 'bg-primary text-white rounded-tr-none' : 'bg-white dark:bg-slate-900 text-slate-800 dark:text-slate-100 rounded-tl-none'}">
              ${m.text}
            </div>
          </div>
        `).join('');
      }).getMessages();
    }

    function postChatMessage() {
      const input = document.getElementById('chat-input');
      if(input.value.trim() === "") return;
      google.script.run.withSuccessHandler(function() { input.value = ""; loadChatMessages(); }).envoyerMessage(userSession ? userSession.name : 'Visiteur', input.value);
    }
  </script>
</body>
</html>

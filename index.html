<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="theme-color" content="#1a5276">
    <meta name="description" content="SOGE ZABANA RH - Plateforme du Pôle Urbain Ahmed Zabana Misserghine">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SOGE ZABANA">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <title>SOGE ZABANA RH - Pôle Urbain Ahmed Zabana</title>
    <style>
        :root {
            --primary: #1a5276;
            --secondary: #2ecc71;
            --bg-light: #f8f9fa;
            --bg-dark: #1a1a2e;
            --text-light: #2c3e50;
            --text-dark: #ecf0f1;
            --card-light: #ffffff;
            --card-dark: #16213e;
            --shadow: 0 4px 15px rgba(0,0,0,0.1);
            --radius: 12px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        [data-theme="dark"] {
            --bg-light: #1a1a2e;
            --bg-dark: #0f0f1a;
            --text-light: #ecf0f1;
            --text-dark: #bdc3c7;
            --card-light: #16213e;
            --card-dark: #0f3460;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font);
            background: var(--bg-light);
            color: var(--text-light);
            transition: var(--transition);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--primary), #2980b9);
            color: white;
            padding: 15px 20px;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 20px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: space-between;
            backdrop-filter: blur(10px);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-icon {
            font-size: 2rem;
        }

        /* Navigation */
        .nav-menu {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .nav-btn {
            background: rgba(255,255,255,0.15);
            border: none;
            color: white;
            padding: 10px 18px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: var(--transition);
            backdrop-filter: blur(5px);
            font-weight: 500;
            white-space: nowrap;
        }

        .nav-btn:hover, .nav-btn.active {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        /* Main Content */
        .main-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Cards */
        .card {
            background: var(--card-light);
            border-radius: var(--radius);
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
            transition: var(--transition);
            border: 1px solid rgba(0,0,0,0.05);
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        /* Search Bar */
        .search-container {
            position: relative;
            margin: 20px 0;
        }

        .search-input {
            width: 100%;
            padding: 16px 20px 16px 50px;
            border: 2px solid var(--primary);
            border-radius: 50px;
            font-size: 1.1rem;
            background: var(--card-light);
            color: var(--text-light);
            transition: var(--transition);
            outline: none;
        }

        .search-input:focus {
            box-shadow: 0 0 0 4px rgba(26, 82, 118, 0.2);
            border-color: var(--secondary);
        }

        .search-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.3rem;
            color: var(--primary);
        }

        /* Grid Layout */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
        }

        .category-item {
            background: var(--card-light);
            padding: 20px;
            border-radius: var(--radius);
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            border: 2px solid transparent;
            font-weight: 500;
        }

        .category-item:hover {
            border-color: var(--primary);
            background: rgba(26, 82, 118, 0.05);
            transform: scale(1.05);
        }

        .category-icon {
            font-size: 2.5rem;
            display: block;
            margin-bottom: 10px;
        }

        /* Buttons */
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 15px rgba(26, 82, 118, 0.3);
        }

        .btn-primary:hover {
            background: #1a6fa0;
            box-shadow: 0 6px 20px rgba(26, 82, 118, 0.4);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: var(--secondary);
            color: white;
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
        }

        /* Forms */
        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-light);
        }

        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: var(--radius);
            font-size: 1rem;
            background: var(--card-light);
            color: var(--text-light);
            transition: var(--transition);
            font-family: var(--font);
        }

        .form-input:focus, .form-select:focus, .form-textarea:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 3px rgba(26, 82, 118, 0.1);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s ease;
            backdrop-filter: blur(5px);
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--card-light);
            padding: 30px;
            border-radius: var(--radius);
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        /* Badge */
        .badge {
            background: var(--secondary);
            color: white;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        /* Footer */
        .footer {
            background: var(--primary);
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 40px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 10px;
            }
            .nav-menu {
                justify-content: center;
            }
            .nav-btn {
                padding: 8px 14px;
                font-size: 0.8rem;
            }
            .grid {
                grid-template-columns: 1fr;
            }
            .category-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* Loading Spinner */
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--primary);
            color: white;
            padding: 15px 25px;
            border-radius: var(--radius);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            z-index: 3000;
            animation: slideIn 0.5s ease;
            font-weight: 500;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* RTL Support */
        [dir="rtl"] {
            direction: rtl;
            text-align: right;
        }

        [dir="rtl"] .search-icon {
            left: auto;
            right: 20px;
        }

        [dir="rtl"] .search-input {
            padding: 16px 50px 16px 20px;
        }
    </style>
</head>

    <script>
        // ============================================
        // APPLICATION PRINCIPALE SOGE ZABANA RH
        // 100% Gratuite - PWA - Paramétrique - Modulaire
        // ============================================

        // Configuration paramétrique
        const CONFIG = {
            appName: 'SOGE ZABANA RH',
            appNameAR: 'سوج زبانة',
            primaryColor: '#1a5276',
            secondaryColor: '#2ecc71',
            quartiers: ['Quartier 1', 'Quartier 2', 'Quartier 3', 'Quartier 4', 'Quartier 5'],
            categories: [
                { id: 'immobilier', icon: '🏠', name: 'Immobilier', nameAR: 'عقارات' },
                { id: 'vehicules', icon: '🚗', name: 'Véhicules', nameAR: 'مركبات' },
                { id: 'services', icon: '🔧', name: 'Services', nameAR: 'خدمات' },
                { id: 'emploi', icon: '💼', name: 'Emploi', nameAR: 'وظائف' },
                { id: 'sante', icon: '🏥', name: 'Santé', nameAR: 'صحة' },
                { id: 'education', icon: '📚', name: 'Éducation', nameAR: 'تعليم' },
                { id: 'evenements', icon: '🎉', name: 'Événements', nameAR: 'أحداث' },
                { id: 'commerces', icon: '🏪', name: 'Commerces', nameAR: 'متاجر' }
            ],
            version: '1.0.0',
            maxUsers: 10000,
            maxConnections: 1000
        };

        // État de l'application
        let APP_STATE = {
            currentPage: 'home',
            currentLanguage: 'fr',
            theme: 'light',
            user: null,
            annonces: [],
            favorites: [],
            messages: []
        };

        // Base de données IndexedDB
        class LocalDB {
            constructor() {
                this.dbName = 'SOGE_ZABANA_DB';
                this.db = null;
                this.init();
            }

            async init() {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(this.dbName, 1);
                    
                    request.onupgradeneeded = (event) => {
                        const db = event.target.result;
                        if (!db.objectStoreNames.contains('annonces')) {
                            db.createObjectStore('annonces', { keyPath: 'id', autoIncrement: true });
                        }
                        if (!db.objectStoreNames.contains('users')) {
                            db.createObjectStore('users', { keyPath: 'email' });
                        }
                        if (!db.objectStoreNames.contains('favorites')) {
                            db.createObjectStore('favorites', { keyPath: 'id', autoIncrement: true });
                        }
                        if (!db.objectStoreNames.contains('messages')) {
                            db.createObjectStore('messages', { keyPath: 'id', autoIncrement: true });
                        }
                        if (!db.objectStoreNames.contains('settings')) {
                            db.createObjectStore('settings', { keyPath: 'key' });
                        }
                    };

                    request.onsuccess = (event) => {
                        this.db = event.target.result;
                        console.log('IndexedDB initialisée avec succès');
                        resolve();
                    };

                    request.onerror = (event) => {
                        console.error('Erreur IndexedDB:', event.target.error);
                        reject(event.target.error);
                    };
                });
            }

            async add(storeName, data) {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction(storeName, 'readwrite');
                    const store = transaction.objectStore(storeName);
                    const request = store.add(data);
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            }

            async getAll(storeName) {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction(storeName, 'readonly');
                    const store = transaction.objectStore(storeName);
                    const request = store.getAll();
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            }

            async put(storeName, data) {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction(storeName, 'readwrite');
                    const store = transaction.objectStore(storeName);
                    const request = store.put(data);
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            }

            async delete(storeName, id) {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction(storeName, 'readwrite');
                    const store = transaction.objectStore(storeName);
                    const request = store.delete(id);
                    request.onsuccess = () => resolve();
                    request.onerror = () => reject(request.error);
                });
            }
        }

        // Initialisation de la base de données
        const db = new LocalDB();

        // Traductions
        const translations = {
            fr: {
                appName: 'SOGE ZABANA RH',
                home: 'Accueil',
                ads: 'Annonces',
                categories: 'Catégories',
                account: 'Compte',
                language: 'عربي',
                login: 'Connexion',
                register: 'Inscription',
                email: 'Email',
                password: 'Mot de passe',
                createAccount: 'Créer un compte',
                lastName: 'Nom',
                firstName: 'Prénom',
                phone: 'Téléphone',
                address: 'Adresse',
                acceptContract: 'J\'accepte les conditions d\'utilisation',
                addAd: 'Publier une annonce',
                title: 'Titre',
                category: 'Catégorie',
                description: 'Description',
                price: 'Prix',
                location: 'Localisation',
                photos: 'Photos',
                whatsapp: 'WhatsApp',
                publish: 'Publier',
                search: 'Rechercher...',
                welcome: 'Bienvenue sur SOGE ZABANA RH',
                footerText: 'Plateforme communautaire du Pôle Urbain Ahmed Zabana'
            },
            ar: {
                appName: 'سوج زبانة',
                home: 'الرئيسية',
                ads: 'الإعلانات',
                categories: 'الفئات',
                account: 'الحساب',
                language: 'FR',
                login: 'تسجيل الدخول',
                register: 'التسجيل',
                email: 'البريد الإلكتروني',
                password: 'كلمة المرور',
                createAccount: 'إنشاء حساب',
                lastName: 'اللقب',
                firstName: 'الاسم',
                phone: 'الهاتف',
                address: 'العنوان',
                acceptContract: 'أوافق على شروط الاستخدام',
                addAd: 'نشر إعلان',
                title: 'العنوان',
                category: 'الفئة',
                description: 'الوصف',
                price: 'السعر',
                location: 'الموقع',
                photos: 'الصور',
                whatsapp: 'واتساب',
                publish: 'نشر',
                search: 'بحث...',
                welcome: 'مرحباً بكم في سوج زبانة',
                footerText: 'المنصة المجتمعية للقطب الحضري أحمد زبانة'
            }
        };

        // Fonctions utilitaires
        function t(key) {
            return translations[APP_STATE.currentLanguage][key] || key;
        }

        function updateTranslations() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (el.tagName === 'INPUT' && el.type === 'submit') {
                    el.value = t(key);
                } else {
                    el.textContent = t(key);
                }
            });
            document.querySelectorAll('[placeholder]').forEach(el => {
                if (el.getAttribute('data-i18n-placeholder')) {
                    el.placeholder = t(el.getAttribute('data-i18n-placeholder'));
                }
            });
        }

        function switchLanguage() {
            APP_STATE.currentLanguage = APP_STATE.currentLanguage === 'fr' ? 'ar' : 'fr';
            document.dir = APP_STATE.currentLanguage === 'ar' ? 'rtl' : 'ltr';
            updateTranslations();
            navigateTo(APP_STATE.currentPage);
            showToast(t('language') + ' changé');
        }

        function toggleTheme() {
